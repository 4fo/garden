name: Deploy Quartz to GitHub Pages
on:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Garden
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: garden-content

      - name: Checkout Quartz Engine
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          path: quartz-engine

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Prepare Garden
        run: |
          cp -r garden-content/content/* quartz-engine/content/
          # Copy config files if they exist in your garden
          cp garden-content/quartz.config.ts quartz-engine/ || true
          cp garden-content/quartz.layout.ts quartz-engine/ || true

      - name: Install & Build
        run: |
          cd quartz-engine
          npm ci
          npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz-engine/public
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
